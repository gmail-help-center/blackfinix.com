<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="movie.css">
</head>
<body>

<div class="auth-box">

  <h2>Login</h2>

  <input type="text" id="loginUser" placeholder="Email or Mobile Number">
  
  <div class="password-box">
  <input
    type="password"
    id="loginPassword"
    placeholder="Password"
    minlength="6"
    maxlength="20">

  <span class="eye" onclick="togglePassword()">👁️</span>
</div>

  <p id="loginMessage"></p>

  <button onclick="loginForm()">Login</button>

  <p>
    Don't have an account?
    <a href="mregistration.html">Register</a>
  </p>

</div>



<script src="movie.js"></script>

</body>
</html>
